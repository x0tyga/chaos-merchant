<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Chaos Merchant{% endblock %} - Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">⚡ Chaos Merchant</div>
    <div class="muted">{{ request.path }}</div>
  </header>
  <nav class="tabs">
    <a href="{{ url_for('home') }}" class="{{ 'active' if request.endpoint == 'home' }}">Home</a>
    <a href="{{ url_for('output_list') }}" class="{{ 'active' if request.endpoint in ('output_list', 'output_detail') }}">Output</a>
    <a href="{{ url_for('analytics_page') }}" class="{{ 'active' if request.endpoint == 'analytics_page' }}">Analytics</a>
    <a href="{{ url_for('trends_page') }}" class="{{ 'active' if request.endpoint == 'trends_page' }}">Trends</a>
    <a href="{{ url_for('research_page') }}" class="{{ 'active' if request.endpoint == 'research_page' }}">Research</a>
    <a href="{{ url_for('settings_page') }}" class="{{ 'active' if request.endpoint in ('settings_page', 'edit_prompt_route') }}">Settings</a>
    <a href="{{ url_for('logs_page') }}" class="{{ 'active' if request.endpoint == 'logs_page' }}">Logs</a>
  </nav>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
